                <label class="form-label" style="margin-bottom: 4px;">จำนวนเด็กนักเรียน (สด  ออน  ลา  ขาด  ชด)</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%;">
                  <div class="form-group">
                    <label class="form-label" style="font-size: 0.72rem; text-transform: none; color: var(--color-success);">🟢 สด</label>
                    <input type="number" id="class_kids_live_3" class="form-input" value="0" min="0" oninput="updateClassKidsSum(3)">
                  </div>
                  <div class="form-group">
                    <label class="form-label" style="font-size: 0.72rem; text-transform: none; color: #3b82f6;">🔵 ออน</label>
                    <input type="number" id="class_kids_online_3" class="form-input" value="0" min="0" oninput="updateClassKidsSum(3)">
                  </div>
                  <div class="form-group">
                    <label class="form-label" style="font-size: 0.72rem; text-transform: none; color: #f59e0b;">🟡 ลา</label>
                    <input type="number" id="class_kids_leave_3" class="form-input" value="0" min="0" oninput="updateClassKidsSum(3)">
                  </div>
                  <div class="form-group">
                    <label class="form-label" style="font-size: 0.72rem; text-transform: none; color: #ef4444;">🔴 ขาด</label>
                    <input type="number" id="class_kids_absent_3" class="form-input" value="0" min="0">
                  </div>
                  <div class="form-group">
                    <label class="form-label" style="font-size: 0.72rem; text-transform: none; color: #c095e7;">🟣 ชด</label>
                    <input type="number" id="class_kids_makeup_3" class="form-input" value="0" min="0">
                  </div>
                  <div class="form-group">
                    <label class="form-label" style="font-size: 0.72rem; text-transform: none; color: #64748b;">🔢 รวม (สด+ออน+ลา)</label>
                    <input type="number" id="class_kids_sum_3" class="form-input" value="0" readonly disabled style="background-color: var(--bg-primary); cursor: not-allowed; font-weight: bold;">
                  </div>
                  <input type="hidden" id="class_kids_orange_3" value="0">
                </div>
              </div>
              
              <div class="form-group form-group-full">
                <label class="form-label">หมายเหตุการเรียน</label>
                <input type="text" id="class_note_3" class="form-input" placeholder="รายละเอียดคลาสเรียน">
              </div>
            
</div>
</div>
