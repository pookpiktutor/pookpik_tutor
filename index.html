<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PookPik Tutor - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff7da0;
      --primary-dark: #e05e82;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #2d3748;
      --text-muted: #718096;
      --border: #e2e8f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Prompt', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 40px 30px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
      text-align: center;
    }

    .logo-container {
      margin-bottom: 24px;
      display: inline-block;
    }

    .logo-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto;
      box-shadow: 0 8px 16px rgba(255, 125, 160, 0.3);
    }

    .logo-circle svg {
      width: 45px;
      height: 45px;
      fill: white;
    }

    h2 {
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text);
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255, 125, 160, 0.15);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 12px rgba(255, 125, 160, 0.2);
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .error-msg {
      color: #e53e3e;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo-container">
        <div class="logo-circle">
          <svg viewBox="0 0 100 100">
            <polygon points="50,25 75,37 50,49 25,37" />
            <path d="M35,42.5 L35,55 C35,61 65,61 65,55 L65,42.5" />
          </svg>
        </div>
      </div>
      <h2>เข้าสู่ระบบ</h2>
      <p class="subtitle">ระบบจัดการสถาบัน PookPik Tutor</p>

      <form id="login-form">
        <div class="form-group">
          <label for="email">อีเมล</label>
          <input type="email" id="email" required placeholder="name@pookpiktutor.com">
        </div>
        <div class="form-group">
          <label for="password">รหัสผ่าน</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn" id="btn-login">เข้าสู่ระบบ</button>
        <div class="error-msg" id="error-message"></div>
      </form>
    </div>
  </div>

  <script type="module" src="/src/login.js"></script>
</body>
</html>
