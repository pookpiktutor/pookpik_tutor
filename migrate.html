<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Data Migration to Firebase</title>
</head>
<body>
    <h1>Data Migration in Progress...</h1>
    <div id="log" style="font-family: monospace; white-space: pre-wrap; font-size: 14px;"></div>
    
    <!-- Use Compat libraries to avoid any ES Module import issues -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <script>
        function logMsg(msg) {
            console.log(msg);
            const logEl = document.getElementById('log');
            if(logEl) logEl.textContent += msg + '\n';
        }

        try {
            logMsg("Initializing Migration Script...");
            
            const firebaseConfig = {
              apiKey: "AIzaSyDR73jjl4afmMVGgCWLXDmKeocmghGX1W4",
              authDomain: "pookpik-tutor.firebaseapp.com",
              projectId: "pookpik-tutor",
              storageBucket: "pookpik-tutor.firebasestorage.app",
              messagingSenderId: "1035837301501",
              appId: "1:1035837301501:web:c21be8f4d4f5b8ec6c5494"
            };

            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            logMsg("Firebase Initialized.");

            const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyYjh5-6frv-AytBYl1EnWB46Vh5_VCkVVRg6XsU4A-KUJoR8nFh46XZ-ffvbtwiZHhhA/exec";

            async function fetchFromGas(funcName, args = []) {
                try {
                    const response = await fetch(WEB_APP_URL, {
                        method: "POST",
                        body: JSON.stringify({ functionName: funcName, arguments: args }),
                        headers: { "Content-Type": "text/plain;charset=utf-8" }
                    });
                    return await response.json();
                } catch (err) {
                    logMsg(`Error fetching ${funcName}: ${err.message}`);
                    return null;
                }
            }

            async function migrateUsers() {
                logMsg('Fetching Users...');
                const users = await fetchFromGas('getUsersDB');
                if (users && users.success) {
                    const colRef = db.collection("users");
                    for (const u of users.data) {
                        await colRef.add({
                            username: u.Username,
                            password: u.Password,
                            role: u.Role,
                            nickname: u.Nickname || "",
                            fullName: u.FullName || "",
                            phone: u.Phone || "",
                            profilePic: u.ProfilePic || ""
                        });
                    }
                    logMsg(`Migrated ${users.data.length} users.`);
                }
            }

            async function migrateTeachers() {
                logMsg('Fetching Teachers...');
                const data = await fetchFromGas('getTeachersList');
                if (data && data.success) {
                    const colRef = db.collection("teachers");
                    for (const u of data.data) {
                        await colRef.add({
                            nickname: u.Nickname,
                            fullName: u.FullName || "",
                            school: u.School || "",
                            phone: u.Phone || "",
                            subjects: u.Subjects || "",
                            bank: u.Bank || "",
                            accountNumber: u.AccountNumber || "",
                            compensation: u.Compensation || "",
                            type: u.Type || ""
                        });
                    }
                    logMsg(`Migrated ${data.data.length} teachers.`);
                }
            }

            async function migrateRooms() {
                logMsg('Fetching Rooms...');
                const data = await fetchFromGas('getRoomsDB');
                if (data && data.success) {
                    const colRef = db.collection("rooms");
                    for (const u of data.data) {
                        await colRef.add({
                            roomName: u.RoomName,
                            properties: u.Properties || ""
                        });
                    }
                    logMsg(`Migrated ${data.data.length} rooms.`);
                }
            }

            async function migrateStudents() {
                logMsg('Fetching Students...');
                const data = await fetchFromGas('getStudentsList');
                if (data && data.success) {
                    const colRef = db.collection("students");
                    for (const u of data.data) {
                        await colRef.add({
                            id: u.id || `MIG_${Date.now()}_${Math.floor(Math.random()*1000)}`,
                            name: u.name || "",
                            nickname: u.nickname || "",
                            school: u.school || "",
                            phone: u.contact || "",
                            branchLearn: u.branchLearn || "",
                            branchPay: u.branchPay || "",
                            paymentMemo: u.paymentTimeNote || "",
                            extraMemo: u.extraNote || "",
                            paidAmount: parseFloat(u.paid) || 0,
                            tuitionFee: parseFloat(u.full) || 0,
                            balance: (parseFloat(u.full) || 0) - (parseFloat(u.paid) || 0),
                            paymentDate: u.paymentDate || "",
                            paymentChannel: u.paymentChannel || "",
                            receiver: u.staff || "",
                            roundLearn: u.round || "",
                            grade: u.grade || "",
                            subroom: u.classSection || "",
                            lineProfile: u.lineName || "",
                            lineId: u.lineId || "",
                            carriedOverFee: parseFloat(u.carriedForwardFee) || 0,
                            studyHours: u.classHours || "",
                            remainingHours: u.classHoursLeft || "",
                            classType: u.classType || "",
                            checked: u.isChecked ? "1" : ""
                        });
                    }
                    logMsg(`Migrated ${data.data.length} students.`);
                }
            }

            async function migrateClassLogs() {
                logMsg('Fetching ClassLogs (Data Learn)...');
                const data = await fetchFromGas('getClassLogs', '');
                if (data && data.success && data.data) {
                    const usersSnapshot = await db.collection("users").get();
                    const usersMap = {};
                    usersSnapshot.forEach(docSnap => {
                        const d = docSnap.data();
                        const id = d.username || d.userId;
                        if (d.name) usersMap[d.name.toLowerCase().trim()] = id;
                        if (d.nickname) usersMap[d.nickname.toLowerCase().trim()] = id;
                    });

                    const colRef = db.collection("ClassLogs"); // Make sure to use 'ClassLogs' as used in firebase_backend.js
                    for (const u of data.data) {
                        let subject = u.subject || "";
                        
                        // Append day and time to subject based on new structure requirements
                        // Format: "วิชา วัน เวลาเริ่ม-เวลาจบ"
                        if (subject && u.date && u.timeStart && u.timeEnd) {
                            // Convert date to day of week
                            const parts = u.date.split('/');
                            if (parts.length === 3) {
                                let y = parseInt(parts[2]);
                                if (y > 2400) y -= 543; // Convert Buddhist year to Gregorian
                                const dateObj = new Date(y, parseInt(parts[1]) - 1, parseInt(parts[0]));
                                const days = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];
                                const dayName = days[dateObj.getDay()];
                                const timeSuffix = `${dayName} ${u.timeStart}-${u.timeEnd}`;
                                
                                if (!subject.includes(timeSuffix)) {
                                    subject = `${subject} ${timeSuffix}`;
                                }
                            }
                        }

                        await colRef.add({
                            date: u.date || "",
                            timeStart: u.timeStart || "",
                            timeEnd: u.timeEnd || "",
                            subject: subject,
                            teacherRegular: u.teacherRegular || "",
                            teacherSub: u.teacherSub || "",
                            mainTeacherId: usersMap[(u.teacherRegular || "").toLowerCase().trim()] || "",
                            subTeacherId: usersMap[(u.teacherSub || "").toLowerCase().trim()] || "",
                            roomBranch: u.roomBranch || "",
                            note: u.note || "",
                            isPresentLive: parseInt(u.isPresentLive) || 0,
                            isPresentOnline: parseInt(u.isPresentOnline) || 0,
                            isLeave: parseInt(u.isLeave) || 0,
                            isAbsent: parseInt(u.isAbsent) || 0,
                            isMakeup: parseInt(u.isMakeup) || 0,
                            isOrange: parseInt(u.isOrange) || 0,
                            hours: parseFloat(u.hours) || 0,
                            teacherConfirmed: parseInt(u.teacherConfirmed) || 0,
                            numKids: parseInt(u.numKids) || 0
                        });
                    }
                    logMsg(`Migrated ${data.data.length} class logs (Data Learn).`);
                } else if (data && !data.success) {
                    logMsg(`Failed to fetch ClassLogs: ${data.error || 'Unknown error'}`);
                }
            }

            async function migrateEvaluations() {
                logMsg('Fetching Evaluations...');
                const data = await fetchFromGas('getEvaluationsList');
                if (data && data.success && data.data) {
                    const colRef = db.collection("evaluations");
                    for (const u of data.data) {
                        await colRef.add({
                            studentId: u.StudentId || "",
                            studentName: u.StudentName || "",
                            subject: u.Subject || "",
                            evalDate: u.EvalDate || "",
                            score: u.Score || "",
                            comments: u.Comments || ""
                        });
                    }
                    logMsg(`Migrated ${data.data.length} evaluations.`);
                }
            }

            async function migrateEnrollments() {
                logMsg('Fetching Enrollments...');
                const data = await fetchFromGas('getTeacherCoursesAndStudents', '');
                if (data && data.success && data.data) {
                    const colRef = db.collection("enrollments");
                    let totalEnrollments = 0;
                    for (const course of data.data) {
                        if (course.students && course.students.length > 0) {
                            for (const student of course.students) {
                                await colRef.add({
                                    courseName: course.courseName || "",
                                    displayCourseName: course.displayCourseName || "",
                                    dayTimeStr: course.dayTimeStr || "",
                                    studentId: student.id || "",
                                    studentName: student.name || "",
                                    branch: student.branch || ""
                                });
                                totalEnrollments++;
                            }
                        }
                    }
                    logMsg(`Migrated ${totalEnrollments} enrollments.`);
                } else if (data && !data.success) {
                    logMsg(`Failed to fetch Enrollments: ${data.error || 'Unknown error'}`);
                }
            }

            async function startMigration() {
                try {
                    await migrateUsers();
                    await migrateTeachers();
                    await migrateRooms();
                    await migrateStudents();
                    await migrateClassLogs();
                    await migrateEvaluations();
                    await migrateEnrollments();
                    logMsg('\nMigration Completed Successfully!');
                } catch (err) {
                    logMsg(`\nMigration Failed: ${err.message}`);
                }
            }

            startMigration();
        } catch (e) {
            logMsg("Critical Error during setup: " + e.message);
        }
    </script>
</body>
</html>
